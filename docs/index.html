<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Usage Mini</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #faf9f7;
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .lang-toggle {
            position: fixed;
            top: 16px;
            right: 20px;
            display: flex;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            font-size: 0.82rem;
            font-weight: 500;
            z-index: 10;
        }
        .lang-toggle button {
            border: none;
            background: transparent;
            padding: 6px 14px;
            cursor: pointer;
            color: #888;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
            transition: all 0.15s;
        }
        .lang-toggle button.active {
            background: #1a1a1a;
            color: white;
        }

        .logo {
            width: 44px;
            height: 44px;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .screenshot {
            width: auto;
            max-height: 28vh;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.05);
            margin-bottom: 32px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 26px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }

        .btn-primary { background: #D97757; color: white; }
        .btn-secondary { background: #1a1a1a; color: white; }
        .btn-outline { background: transparent; color: #1a1a1a; border: 1.5px solid #ddd; }
        .btn-outline:hover { border-color: #999; opacity: 1; }

        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 0;
            text-align: left;
        }

        .feature {
            padding: 14px 16px;
            background: white;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .feature-title {
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 4px;
        }

        .feature-desc {
            font-size: 0.8rem;
            color: #888;
            line-height: 1.4;
        }

        .footer {
            position: fixed;
            bottom: 16px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.75rem;
            color: #aaa;
        }
        .footer a { color: #888; text-decoration: none; }
        .footer a:hover { color: #D97757; }

        @media (max-width: 700px) {
            body { height: auto; overflow: auto; }
            h1 { font-size: 1.6rem; }
            .features { grid-template-columns: repeat(2, 1fr); }
            .screenshot { max-height: 30vh; }
        }

        @media (max-width: 480px) {
            .features { grid-template-columns: 1fr; }
            .lang-toggle { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div class="lang-toggle">
        <button id="btn-fr" class="active" onclick="setLang('fr')">FR</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <svg class="logo" viewBox="0 0 256 257" fill="#D97757" xmlns="http://www.w3.org/2000/svg">
            <path d="m50.228 170.321l50.357-28.257l.843-2.463l-.843-1.361h-2.462l-8.426-.518l-28.775-.778l-24.952-1.037l-24.175-1.296l-6.092-1.297L0 125.796l.583-3.759l5.12-3.434l7.324.648l16.202 1.101l24.304 1.685l17.629 1.037l26.118 2.722h4.148l.583-1.685l-1.426-1.037l-1.101-1.037l-25.147-17.045l-27.22-18.017l-14.258-10.37l-7.713-5.25l-3.888-4.925l-1.685-10.758l7-7.713l9.397.649l2.398.648l9.527 7.323l20.35 15.75L94.817 91.9l3.889 3.24l1.555-1.102l.195-.777l-1.75-2.917l-14.453-26.118l-15.425-26.572l-6.87-11.018l-1.814-6.61c-.648-2.723-1.102-4.991-1.102-7.778l7.972-10.823L71.42 0l10.63 1.426l4.472 3.888l6.61 15.101l10.694 23.786l16.591 32.34l4.861 9.592l2.592 8.879l.973 2.722h1.685v-1.556l1.36-18.211l2.528-22.36l2.463-28.776l.843-8.1l4.018-9.722l7.971-5.25l6.222 2.981l5.12 7.324l-.713 4.73l-3.046 19.768l-5.962 30.98l-3.889 20.739h2.268l2.593-2.593l10.499-13.934l17.628-22.036l7.778-8.749l9.073-9.657l5.833-4.601h11.018l8.1 12.055l-3.628 12.443l-11.342 14.388l-9.398 12.184l-13.48 18.147l-8.426 14.518l.778 1.166l2.01-.194l30.46-6.481l16.462-2.982l19.637-3.37l8.88 4.148l.971 4.213l-3.5 8.62l-20.998 5.184l-24.628 4.926l-36.682 8.685l-.454.324l.519.648l16.526 1.555l7.065.389h17.304l32.21 2.398l8.426 5.574l5.055 6.805l-.843 5.184l-12.962 6.611l-17.498-4.148l-40.83-9.721l-14-3.5h-1.944v1.167l11.666 11.406l21.387 19.314l26.767 24.887l1.36 6.157l-3.434 4.86l-3.63-.518l-23.526-17.693l-9.073-7.972l-20.545-17.304h-1.36v1.814l4.73 6.935l25.017 37.59l1.296 11.536l-1.814 3.76l-6.481 2.268l-7.13-1.297l-14.647-20.544l-15.1-23.138l-12.185-20.739l-1.49.843l-7.194 77.448l-3.37 3.953l-7.778 2.981l-6.48-4.925l-3.436-7.972l3.435-15.749l4.148-20.544l3.37-16.333l3.046-20.285l1.815-6.74l-.13-.454l-1.49.194l-15.295 20.999l-23.267 31.433l-18.406 19.702l-4.407 1.75l-7.648-3.954l.713-7.064l4.277-6.286l25.47-32.405l15.36-20.092l9.917-11.6l-.065-1.686h-.583L44.07 198.125l-12.055 1.555l-5.185-4.86l.648-7.972l2.463-2.593l20.35-13.999z"/>
        </svg>

        <h1>Claude Usage Mini</h1>
        <p class="subtitle" data-fr="Surveillez votre utilisation Claude depuis la barre de menu macOS.<br>Léger, natif, élégant." data-en="Monitor your Claude usage from the macOS menu bar.<br>Lightweight, native, beautiful."></p>

        <img src="screenshot.png" alt="Claude Usage Mini screenshot" class="screenshot">

        <div class="buttons">
            <a href="https://github.com/jeremy-prt/claude-usage-mini/releases/latest" class="btn btn-primary">
                <span data-fr="Télécharger .DMG" data-en="Download .DMG"></span>
            </a>
            <a href="https://github.com/jeremy-prt/claude-usage-mini" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>
                GitHub
            </a>
            <a href="setup.html" class="btn btn-outline">
                <span data-fr="Comment installer ?" data-en="How to install?"></span>
            </a>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-title" data-fr="Sessions 5h & 7j" data-en="5h & 7d Sessions"></div>
                <div class="feature-desc" data-fr="Suivez vos fenêtres d'utilisation en un coup d'oeil." data-en="Track your rolling usage windows at a glance."></div>
            </div>
            <div class="feature">
                <div class="feature-title" data-fr="Fenêtre de contexte" data-en="Context Window"></div>
                <div class="feature-desc" data-fr="Voyez le remplissage avant le compactage auto." data-en="See context fill before auto-compact."></div>
            </div>
            <div class="feature">
                <div class="feature-title" data-fr="Notifications" data-en="Notifications"></div>
                <div class="feature-desc" data-fr="Alertes quand vous approchez vos limites." data-en="Alerts when approaching usage limits."></div>
            </div>
            <div class="feature">
                <div class="feature-title" data-fr="Français & English" data-en="Français & English"></div>
                <div class="feature-desc" data-fr="Interface disponible dans les deux langues." data-en="Full interface in both languages."></div>
            </div>
        </div>

        <div class="footer">
            macOS 26+ &middot; Open Source &middot; <a href="https://github.com/jeremy-prt/claude-usage-mini/blob/main/LICENSE">BSD-2-Clause</a>
            &middot; <span data-fr="Basé sur" data-en="Based on"></span> <a href="https://github.com/Blimp-Labs/claude-usage-bar">claude-usage-bar</a>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.querySelectorAll('[data-fr]').forEach(el => {
                el.innerHTML = el.getAttribute('data-' + lang);
            });
            document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.documentElement.lang = lang;
            localStorage.setItem('lang', lang);
        }

        const saved = localStorage.getItem('lang');
        const browserLang = navigator.language.startsWith('fr') ? 'fr' : 'en';
        setLang(saved || browserLang);
    </script>
</body>
</html>
